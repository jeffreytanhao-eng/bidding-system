<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}招标管理系统{% endblock %}</title>
    <style>
        :root {
            --primary: #1890ff;
            --primary-dark: #096dd9;
            --success: #52c41a;
            --warning: #faad14;
            --error: #ff4d4f;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #333333;
            --text-secondary: #666666;
            --border: #e8e8e8;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #001529 0%, #003a70 100%);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .navbar-brand {
            color: white;
            font-size: 20px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-menu {
            display: flex;
            gap: 4px;
        }
        .navbar-menu a {
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .navbar-menu a:hover, .navbar-menu a.active {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .content {
            margin-top: 64px;
            padding: 24px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        .page-header {
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
        }
        .page-header p {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 14px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 24px;
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
        }
        .stat-card .stat-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }
        .stat-card .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-card .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }
        .btn {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-warning {
            background: var(--warning);
            color: white;
        }
        .btn-error {
            background: var(--error);
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th, table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        table th {
            background: #fafafa;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }
        table td {
            font-size: 14px;
        }
        table tr:hover {
            background: #f5f5f5;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-blue { background: #e6f7ff; color: #1890ff; }
        .badge-green { background: #f6ffed; color: #52c41a; }
        .badge-orange { background: #fff7e6; color: #fa8c16; }
        .badge-red { background: #fff1f0; color: #ff4d4f; }
        .badge-gray { background: #f5f5f5; color: #999; }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .toolbar-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .search-box {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            width: 240px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 8px;
            width: 600px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: 16px;
        }
        .modal-close {
            cursor: pointer;
            font-size: 20px;
            color: #999;
            background: none;
            border: none;
        }
        .modal-body {
            padding: 24px;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            text-align: right;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .actions .btn {
            padding: 4px 12px;
            font-size: 12px;
        }
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 12px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">🏗️ 招标管理系统</a>
        <div class="navbar-menu">
            <a href="/" class="{% if page == 'home' %}active{% endif %}">首页</a>
            <a href="/suppliers" class="{% if page == 'suppliers' %}active{% endif %}">供应商</a>
            <a href="/tenders" class="{% if page == 'tenders' %}active{% endif %}">标书管理</a>
            <a href="/reviews" class="{% if page == 'reviews' %}active{% endif %}">评审中心</a>
            <a href="/results" class="{% if page == 'results' %}active{% endif %}">中标管理</a>
        </div>
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        © 2026 招标管理系统 - Powered by FastAPI + Jinja2
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
