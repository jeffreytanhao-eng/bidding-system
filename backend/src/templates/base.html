<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}招标管理系统{% endblock %}</title>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-active: #096dd9;
            --success: #52c41a;
            --success-hover: #73d13d;
            --warning: #faad14;
            --warning-hover: #ffc53d;
            --error: #ff4d4f;
            --error-hover: #ff7875;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #262626;
            --text-secondary: #8c8c8c;
            --text-tertiary: #bfbfbf;
            --border: #e8e8e8;
            --border-light: #f0f0f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
            --radius-sm: 4px;
            --radius: 6px;
            --radius-lg: 8px;
            --font-xs: 12px;
            --font-sm: 13px;
            --font-base: 14px;
            --font-md: 15px;
            --font-lg: 16px;
            --font-xl: 18px;
            --font-2xl: 22px;
            --font-3xl: 28px;
            --line-height: 1.5715;
            --height-sm: 28px;
            --height-base: 32px;
            --height-lg: 40px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: var(--font-base);
            line-height: var(--line-height);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #001529 0%, #003a70 100%);
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .navbar-brand {
            color: white;
            font-size: var(--font-lg);
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        .navbar-menu {
            display: flex;
            gap: 2px;
        }
        .navbar-menu a {
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: var(--radius);
            font-size: var(--font-base);
            transition: all 0.25s;
        }
        .navbar-menu a:hover, .navbar-menu a.active {
            color: white;
            background: rgba(255,255,255,0.12);
        }
        .content {
            margin-top: 56px;
            padding: 20px 24px 32px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        .page-header {
            margin-bottom: 20px;
        }
        .page-header h1 {
            font-size: var(--font-2xl);
            font-weight: 600;
            color: var(--text);
        }
        .page-header p {
            color: var(--text-secondary);
            margin-top: 4px;
            font-size: var(--font-base);
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: var(--font-lg);
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            padding: 20px;
            text-align: center;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .stat-card .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-size: var(--font-3xl);
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }
        .stat-card .stat-label {
            color: var(--text-secondary);
            font-size: var(--font-sm);
            margin-top: 4px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: var(--height-base);
            padding: 0 14px;
            border-radius: var(--radius);
            border: 1px solid transparent;
            font-size: var(--font-base);
            font-weight: 400;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
            line-height: 1;
        }
        .btn:hover { opacity: 0.85; }
        .btn:active { opacity: 0.7; }
        .btn-lg {
            height: var(--height-lg);
            padding: 0 20px;
            font-size: var(--font-md);
            border-radius: var(--radius);
        }
        .btn-sm {
            height: var(--height-sm);
            padding: 0 10px;
            font-size: var(--font-xs);
            border-radius: var(--radius-sm);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: var(--primary-hover); opacity: 1; }
        .btn-primary:active { background: var(--primary-active); }
        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover { background: var(--success-hover); opacity: 1; }
        .btn-warning {
            background: var(--warning);
            color: white;
        }
        .btn-warning:hover { background: var(--warning-hover); opacity: 1; }
        .btn-error {
            background: var(--error);
            color: white;
        }
        .btn-error:hover { background: var(--error-hover); opacity: 1; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
            opacity: 1;
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            border-color: var(--primary);
            color: var(--primary);
            opacity: 1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th, table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
            font-size: var(--font-base);
            vertical-align: middle;
        }
        table th {
            background: var(--border-light);
            font-weight: 500;
            color: var(--text-secondary);
            font-size: var(--font-sm);
        }
        table td {
            color: var(--text);
        }
        table tr:hover {
            background: #fafafa;
        }
        table td strong {
            font-weight: 500;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            height: 22px;
            padding: 0 8px;
            border-radius: 10px;
            font-size: var(--font-xs);
            font-weight: 500;
            line-height: 1;
        }
        .badge-blue { background: #e6f7ff; color: #1890ff; }
        .badge-green { background: #f6ffed; color: #52c41a; }
        .badge-orange { background: #fff7e6; color: #fa8c16; }
        .badge-red { background: #fff1f0; color: #ff4d4f; }
        .badge-gray { background: #f5f5f5; color: #8c8c8c; }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }
        .toolbar-left {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .toolbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-box {
            height: var(--height-base);
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: var(--font-base);
            width: 220px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24,144,255,0.15);
        }
        .search-box::placeholder {
            color: var(--text-tertiary);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.45);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: var(--radius-lg);
            width: 560px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
        }
        .modal-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-size: var(--font-lg);
            font-weight: 600;
            color: var(--text);
        }
        .modal-close {
            cursor: pointer;
            font-size: 18px;
            color: var(--text-tertiary);
            background: none;
            border: none;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }
        .modal-close:hover {
            color: var(--text-secondary);
            background: var(--border-light);
        }
        .modal-body {
            padding: 20px;
        }
        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border-light);
            text-align: right;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: var(--font-sm);
            color: var(--text);
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            height: var(--height-base);
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: var(--font-base);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group textarea {
            height: auto;
            min-height: 72px;
            padding: 6px 10px;
            resize: vertical;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24,144,255,0.15);
        }
        .form-group input::placeholder, .form-group textarea::placeholder {
            color: var(--text-tertiary);
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: var(--font-base);
        }
        .actions {
            display: flex;
            gap: 6px;
        }
        .actions .btn {
            height: var(--height-sm);
            padding: 0 8px;
            font-size: var(--font-xs);
        }
        .score-value {
            font-weight: 600;
            font-size: var(--font-lg);
            color: var(--primary);
        }
        .score-total {
            color: var(--text-tertiary);
            font-size: var(--font-sm);
        }
        .money-value {
            color: #fa8c16;
            font-weight: 500;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-tertiary);
            font-size: var(--font-xs);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">🏗️ 招标管理系统</a>
        <div class="navbar-menu">
            <a href="/" class="{% if page == 'home' %}active{% endif %}">首页</a>
            <a href="/suppliers" class="{% if page == 'suppliers' %}active{% endif %}">供应商</a>
            <a href="/tenders" class="{% if page == 'tenders' %}active{% endif %}">标书管理</a>
            <a href="/reviews" class="{% if page == 'reviews' %}active{% endif %}">评审中心</a>
            <a href="/results" class="{% if page == 'results' %}active{% endif %}">中标管理</a>
        </div>
    </nav>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        © 2026 招标管理系统 - Powered by FastAPI + Jinja2
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
